# Nixpacks конфигурация для Telegram Channel Finder Bot
# Автоматическое определение Python проекта по requirements.txt

[start]
cmd = "python main.py"

[variables]
# Python настройки
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"

# Настройки приложения
ENVIRONMENT = "production"
DATABASE_PATH = "bot.db"
LOG_LEVEL = "INFO"

# Порт для админ-панели (если нужен)
PORT = "8080"
