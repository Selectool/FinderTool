[providers]
python = "3.11"

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt"
]

[phases.build]
cmds = [
    "chmod +x start.sh"
]

[start]
cmd = "./start.sh"

[variables]
PYTHONUNBUFFERED = "1"
ENVIRONMENT = "production"
